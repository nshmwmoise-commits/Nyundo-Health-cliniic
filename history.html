<h2>Exchange History</h2>

<table>
  <tr>
    <th>Date</th>
    <th>From</th>
    <th>To</th>
    <th>Amount</th>
  </tr>
  <tbody id="historyTable"></tbody>
</table>

<script>
let history = [
  {date:"2026-05-01", from:"USD", to:"RWF", amount:100},
  {date:"2026-05-02", from:"EUR", to:"USD", amount:50}
];

function loadHistory() {
  let table = document.getElementById("historyTable");
  history.forEach(item => {
    let row = `<tr>
      <td>${item.date}</td>
      <td>${item.from}</td>
      <td>${item.to}</td>
      <td>${item.amount}</td>
    </tr>`;
    table.innerHTML += row;
  });
}

loadHistory();

function saveTransaction(from, to, amount) {
  let history = JSON.parse(localStorage.getItem("history")) || [];

  let transaction = {
    date: new Date().toLocaleString(),
    from: from,
    to: to,
    amount: amount
  };

  history.push(transaction);

  localStorage.setItem("history", JSON.stringify(history));
}

</script>
