<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  min-height: 100vh;
  transition: 0.3s;
}

/* 🌄 BACKGROUND IMAGE (always) */
body.light {
  background:
    linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)),
    url("istockphoto-460325179-1024x1024.jpg") center/cover no-repeat;
  color: black;
}

body.dark {
  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url("istockphoto-460325179-1024x1024.jpg") center/cover no-repeat;
  color: white;
}

/* 📦 CARD */
.container {
  max-width: 400px;
  margin: 80px auto;
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.2);
}

/* inputs */
input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

/* button */
button {
  padding: 10px;
  width: 100%;
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
}

/* 🌙 Toggle switch style */
.toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.switch {
  position: relative;
  width: 50px;
  height: 25px;
}

.switch input {
  display: none;
}

.slider {
  position: absolute;
  cursor: pointer;
  background: #ccc;
  border-radius: 25px;
  width: 100%;
  height: 100%;
  transition: 0.3s;
}

.slider:before {
  content: "";
  position: absolute;
  height: 20px;
  width: 20px;
  left: 3px;
  top: 2.5px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider {
  background: #4caf50;
}

input:checked + .slider:before {
  transform: translateX(25px);
}
 .nav{
      padding:30px;
       background: white;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }
</style>

</head>

<body class="light">

<div class="container">
  <h2>Settings</h2>

  <label>Default Currency</label>
  <select id="currency">
    <option>USD</option>
    <option>EUR</option>
    <option>RWF</option>
  </select>

  <div class="toggle">
    <span>🌙 Dark Mode</span>
    <label class="switch">
      <input type="checkbox" id="themeToggle">
      <span class="slider"></span>
    </label>
  </div>

</div>

<script>

/* 🔄 CHANGE THEME INSTANTLY */
const toggle = document.getElementById("themeToggle");

toggle.addEventListener("change", () => {
  if(toggle.checked){
    document.body.classList.remove("light");
    document.body.classList.add("dark");
    localStorage.setItem("theme", "dark");
  } else {
    document.body.classList.remove("dark");
    document.body.classList.add("light");
    localStorage.setItem("theme", "light");
  }
});

/* 💾 LOAD SAVED THEME AUTOMATIC */
window.onload = () => {
  let savedTheme = localStorage.getItem("theme") || "light";

  document.body.classList.add(savedTheme);

  if(savedTheme === "dark"){
    toggle.checked = true;
  }
};

</script>

</body>
</html>
